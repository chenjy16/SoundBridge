name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dsp:
    name: DSP (CMake + tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Configure DSP
        run: cmake -S packages/dsp -B packages/dsp/build -DCMAKE_BUILD_TYPE=Release
      - name: Build DSP
        run: cmake --build packages/dsp/build --config Release --parallel
      - name: Run DSP tests
        run: |
          cd packages/dsp/build
          ctest --output-on-failure

  host:
    name: Host (Swift)
    runs-on: macos-14
    needs: dsp
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build DSP dependency (universal)
        run: |
          cmake -S packages/dsp -B packages/dsp/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          cmake --build packages/dsp/build --config Release --parallel
      - name: Build host engine (universal)
        env:
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        run: |
          swift build --configuration release --package-path packages/host \
            --triple arm64-apple-macosx
          swift build --configuration release --package-path packages/host \
            --triple x86_64-apple-macosx

  driver:
    name: HAL Driver (optional)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0            # we need tags for libASPL version detection
          submodules: recursive
      - name: Fetch libASPL tags
        run: |
          cd packages/driver/vendor/libASPL
          git fetch --tags --force --prune origin 2>/dev/null || true
          # Verify tags are available
          if git describe --tags --always HEAD >/dev/null 2>&1; then
            echo "✓ libASPL version: $(git describe --tags --always HEAD)"
          else
            echo "⚠️ No tags found, will use fallback version"
          fi
      - name: Detect libASPL vendor drop
        id: libaspl
        run: |
          if [ -d packages/driver/vendor/libASPL ] && [ -f packages/driver/vendor/libASPL/CMakeLists.txt ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip driver build (libASPL missing)
        if: steps.libaspl.outputs.present != 'true'
        run: echo "::warning::libASPL vendor folder not present; skipping driver build."
      - name: Build HAL driver (universal)
        if: steps.libaspl.outputs.present == 'true'
        run: |
          # Ensure libASPL has a version tag for CMake
          cd packages/driver/vendor/libASPL
          if ! git describe --tags HEAD >/dev/null 2>&1; then
            LATEST_TAG=$(git ls-remote --tags origin | grep -oP 'refs/tags/\K[^{}]+$' | sort -V | tail -1)
            if [ -n "$LATEST_TAG" ]; then
              git tag "$LATEST_TAG" HEAD 2>/dev/null || true
              echo "Created local tag: $LATEST_TAG"
            fi
          fi
          cd "$GITHUB_WORKSPACE"
          cmake -S packages/driver -B packages/driver/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          cmake --build packages/driver/build --config Release --parallel

